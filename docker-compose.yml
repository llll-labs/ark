# Reference local infra for any @kurark/ark consumer.
# Neutral `ark` defaults; override DB identity / project prefix via .env.
# Run via the consumer's `pnpm docker:up` (scoped by PORT) or directly:
#   docker compose -f node_modules/@kurark/ark/docker-compose.yml up -d
services:
  postgres:
    image: postgres:18
    container_name: ${COMPOSE_PROJECT:-ark}-postgres-${PORT:-5400}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ark}
      POSTGRES_USER: ${POSTGRES_USER:-ark}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ark}
    ports:
      - '${POSTGRES_PORT:-5401}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-ark} -d ${POSTGRES_DB:-ark}
      interval: 5s
      timeout: 5s
      retries: 10

  rustfs:
    image: rustfs/rustfs:latest
    container_name: ${COMPOSE_PROJECT:-ark}-rustfs-${PORT:-5400}
    restart: unless-stopped
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
      RUSTFS_CONSOLE_ENABLE: 'true'
    ports:
      - '${RUSTFS_PORT:-5402}:9000'
      - '${RUSTFS_CONSOLE_PORT:-5403}:9001'
    volumes:
      - rustfs-data:/data
    command:
      - --address
      - :9000
      - --console-enable
      - /data

volumes:
  postgres-data:
    name: ${COMPOSE_PROJECT:-ark}-postgres-data-${PORT:-5400}
  rustfs-data:
    name: ${COMPOSE_PROJECT:-ark}-rustfs-data-${PORT:-5400}
